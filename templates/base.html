<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Empresas y EECC</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; font-size: 1.15rem; margin: 0; padding: 0; background: #f8f9fa; }
        header { background: #003366; color: white; padding: 16px; border-bottom: 4px solid #002244; }
        nav a { color: white; margin-right: 16px; text-decoration: none; }
        main { padding: 24px; }
        .card { background: white; border: 1px solid #dcdcdc; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 10px 8px; border: 1px solid #dee2e6; }
        th { background: #e9ecef; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, select, textarea { font-family: inherit; font-size: 1rem; width: 100%; padding: 8px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; }
        button { margin-top: 16px; padding: 10px 18px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #002244; }
        @media print { .no-pdf { display: none !important; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        function exportToPDF(elementId, filename) {
            const element = document.getElementById(elementId);
            const opt = {
                margin: 10,
                filename: filename + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</head>
<body>
    <header class="no-pdf">
        <nav>
            <a href="/">Inicio</a>
            <a href="/entry">Nueva captura</a>
            <a href="/companies">Empresas</a>
            <a href="/balances">Balances</a>
            <a href="/metrics">Métricas</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
